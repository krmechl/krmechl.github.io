<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://unpkg.com/compromise"></script>
<script src="https://cdn.tailwindcss.com"></script>
<title>Social AI Chat</title>
<link rel="shortcut icon" href="ai.ico">
<link rel="icon" href="ai.ico">
<meta name="theme-color" content="#191970">
<style>
#chatHistory { scrollbar-width: thin; scrollbar-color: #a0aec0 transparent; }
#chatHistory::-webkit-scrollbar { width: 8px; }
#chatHistory::-webkit-scrollbar-thumb { background-color: #a0aec0; border-radius: 4px; }
#toast {
  display: none;
  position: fixed;
  top: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10000;
  background: #2563eb;
  color: #fff;
  padding: 12px 24px;
  border-radius: 6px;
  font-size: 1em;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  max-width: 400px;
  min-width: 180px;
  word-break: break-word;
  white-space: normal;
  text-align: center;
}
.ad-bubble {
  background: #d1fae5;
  color: #065f46;
  border-radius: 0.5rem;
  padding: 1rem;
  margin-top: 0.5rem;
  margin-bottom: 1.5rem;
  width: 340px;
  min-height: 60px;
  max-height: 220px;
  overflow: auto;
  margin-left: 0;
  margin-right: auto;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  word-break: break-word;
  max-width: 80%;
}
.ad-bubble a { color: #047857; text-decoration: underline; }
.ad-bubble img { max-height: 36px; margin-bottom: 0.5rem; border-radius: 0.25rem; }
#modelStatus { display: none; font-size: 0.9rem; color: #374151; margin-bottom: 8px; }
#modelStatus strong { color: #111827; }
#errorPanel, #configPanel, #debugPanel {
  display: none;
  white-space: pre-wrap;
  padding: 10px 12px;
  border-radius: 8px;
  margin-bottom: 10px;
  font-size: 0.92rem;
}
#errorPanel { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
#configPanel { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
#debugPanel { background: #ecfeff; color: #155e75; border: 1px solid #a5f3fc; max-height: 220px; overflow: auto; }
.related-photo-wrap {
  width: 150px;
  height: 150px;
  flex-shrink: 0;
  overflow: hidden;
  border-radius: 12px;
}
.related-photo-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
</style>
</head>
<body class="bg-gray-100 h-screen flex flex-col">
<main class="flex flex-col flex-grow w-full h-full p-4">
<div class="flex justify-between items-center mb-2">
<div>
<img id="aiLogo" src="ai.gif" alt="Social AI" class="h-8 w-auto" />
</div>
<div class="flex items-center gap-2">
<button id="adToggleBtn" class="w-10 h-10 rounded bg-green-100 text-green-900 font-bold border border-green-200 flex items-center justify-center mr-2 transition-colors" title="Toggle ads">Ads</button>
<label for="conversationSelect" class="font-semibold text-gray-700">Prior:</label>
<select id="conversationSelect" class="border rounded px-2 py-1 focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
<button id="newConversationBtn" class="bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700 transition" title="Start a new conversation">New conversation</button>
</div>
</div>
<div id="modelStatus"></div>
<div id="configPanel"><strong>Config needed:</strong> mlvoca.com is configured in the code below.</div>
<div id="errorPanel"></div>
<div id="debugPanel"></div>
<div id="chatHistory" class="flex-grow bg-white rounded shadow p-4 overflow-y-auto mb-4 min-h-[400px] max-h-[80vh]"></div>

<form id="chatForm" class="flex gap-2">
<textarea id="chatInput" rows="1" placeholder="Ask Social AI anything ..." class="flex-grow border rounded px-3 py-2 w-full resize-none focus:outline-none focus:ring-2 focus:ring-black" required aria-label="Chat message input"></textarea>
<button type="button" id="copyInputBtn" title="Copy to clipboard">⧉</button>
<div align="left" id="deployment-f45e3c24-f931-4ada-8701-1f799e05d368"></div>
<button type="submit" class="bg-black text-white px-4 py-2 rounded hover:bg-gray-900 transition" aria-label="Send message">➣</button>
</form>

<hr style="height:2px">
<form id="googleSearchForm" style="display:flex; gap:8px;" onsubmit="return false;">
<input type="text" id="googleSearchInput" placeholder="Realtime internet query" style="flex:1; padding:8px; font-size:16px;">
<button type="button" id="googleSearchBtn" style="padding:8px 16px; font-size:16px;" class="bg-black text-white px-4 py-2 rounded hover:bg-gray-900 transition">➣</button>
</form>

<form id="agentPromptForm" style="display:flex; gap:8px; margin-top:4px; margin-bottom:2px" onsubmit="return false;">
<input type="text" id="agentPromptInput" placeholder="Set your Agent Alert" style="flex:1; padding:8px; font-size:16px;">
<button type="button" id="agentPromptBtn" style="padding:8px 16px; font-size:16px;" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">➣</button>
</form>

<hr style="height:2px">
<div class="relative mt-2" id="followupDropdownContainer">
<button id="toggleFollowupDropdown" type="button" class="bg-black text-white px-3 py-1 rounded hover:bg-gray-900 transition font-medium" style="margin-bottom:1px;">
Follow-up Questions ▼
</button>
<div id="followupDropdown" style="display:none; position:absolute; left:0; right:0; z-index:50;" class="bg-white border border-blue-200 rounded shadow-lg mt-1">
<ul class="divide-y divide-blue-100" id="followupList"></ul>
</div>
</div>
</main>

<div id="toast"></div>

<script>
const agentResponses = [
  "New research paper on AI ethics.",
  "Update: Stock prices for AI companies have changed.",
  "Agent discovered a trending topic: AI in healthcare.",
  "New open-source LLM released.",
  "Your monitored topic has a new blog post.",
  "Recent breakthrough in AI image generation.",
  "AI-powered app featured in major tech news."
];
let currentAgentPrompt = "";
const agentMessageUrls = {
  "Agent found a new research paper on AI ethics.": "https://arxiv.org/abs/1234.5678",
  "Agent alert: New open-source LLM released.": "https://huggingface.co/models"
};
function showAgentToast(message) {
  const url = agentMessageUrls[message] || "https://andisearch.com";
  const toast = document.getElementById('toast');
  toast.innerHTML = `<strong>— Agent Alert —</strong><br>
    <a href="#" id="agentToastLink" style="color:#000000; text-decoration:underline;">${message || "Agent alert"}</a>`;
  toast.style.display = 'block';
  document.getElementById('agentToastLink').onclick = function(e) {
    e.preventDefault();
    window.open(url, 'agentPopup', 'height=450,width=675,left=325,top=150,resizable=yes,scrollbars=yes,toolbar=no,menubar=no,location=no,status=no');
  };
  setTimeout(() => { toast.style.display = 'none'; }, 8000);
}
document.getElementById('agentPromptBtn').addEventListener('click', function() {
  const prompt = document.getElementById('agentPromptInput').value.trim();
  if (prompt) {
    currentAgentPrompt = prompt;
    showAgentToast("");
  }
});
setInterval(function() {
  if (!currentAgentPrompt) return;
  const msg = agentResponses[Math.floor(Math.random() * agentResponses.length)];
  showAgentToast(msg);
}, 20000);

function extractRelevantKeywords(text) {
  const doc = nlp(text);
  let nouns = doc.nouns().toSingular().out('array').map(w => w.toLowerCase());
  nouns = Array.from(new Set(nouns)).filter(word => word.length > 2);
  return nouns;
}

async function fetchGumGumAd(query) {
  const keywords = extractRelevantKeywords(query);
  const adKeywords = keywords.slice(0, 3).join(' ');
  return {
    title: `Item: ${adKeywords ? adKeywords.charAt(0).toUpperCase() + adKeywords.slice(1) : "Great Deals"}`,
    description: adKeywords ? `Save big on ${adKeywords}! Limited-time offer.` : "Save big with our latest deals!",
    image: "ads.png?text=Ad",
    url: "https://www.amazon.com/s?k=" + encodeURIComponent(adKeywords)
  };
}

async function fetchRelevantImage(query) {
  const API_KEY = 'WbmeqR1iHjvnFiSD91AP5vN6vE3NDQLz4UnlxGGdKzt4MCRsqYJiKRHT';
  const keywords = extractRelevantKeywords(query).slice(0, 3).join(' ');
  if (!keywords) return null;
  const url = `https://api.pexels.com/v1/search?query=${encodeURIComponent(keywords)}&per_page=1`;
  try {
    const response = await fetch(url, { headers: { Authorization: API_KEY } });
    if (!response.ok) return null;
    const data = await response.json();
    if (data.photos && data.photos.length > 0) {
      const photo = data.photos[0];
      return {
        src: photo.src.medium,
        alt: photo.alt || keywords,
        photographer: photo.photographer || ""
      };
    }
  } catch {}
  return null;
}

(() => {
  const chatHistory = document.getElementById('chatHistory');
  const chatForm = document.getElementById('chatForm');
  const chatInput = document.getElementById('chatInput');
  const newConversationBtn = document.getElementById('newConversationBtn');
  const conversationSelect = document.getElementById('conversationSelect');
  const adToggleBtn = document.getElementById('adToggleBtn');
  const errorPanel = document.getElementById('errorPanel');
  const debugPanel = document.getElementById('debugPanel');
  let adsEnabled = true;
  let conversations = {};
  let activeConversationId = null;
  let adRenderToken = 0;
  const STORAGE_KEYS = {
    conversations: 'chatApp_conversations',
    activeConversationId: 'chatApp_activeConversationId'
  };

  const MLVOCA_BASE = "https://mlvoca.com";
  const MLVOCA_ENDPOINT = `${MLVOCA_BASE}/api/generate`;
  const MLVOCA_MODEL = "tinyllama";

  document.getElementById('modelStatus').textContent = `Model in use: ${MLVOCA_MODEL}`;
  document.getElementById('configPanel').style.display = 'block';

  function showError(message) {
    errorPanel.textContent = message;
    errorPanel.style.display = 'block';
  }
  function clearError() {
    errorPanel.textContent = '';
    errorPanel.style.display = 'none';
  }
  function showDebug(message) {
    debugPanel.textContent = message;
    debugPanel.style.display = 'block';
  }
  function clearDebug() {
    debugPanel.textContent = '';
    debugPanel.style.display = 'none';
  }

  function updateAdToggleBtn() {
    if (adsEnabled) {
      adToggleBtn.classList.remove('bg-red-100', 'text-red-900', 'border-red-200');
      adToggleBtn.classList.add('bg-green-100', 'text-green-900', 'border-green-200');
    } else {
      adToggleBtn.classList.remove('bg-green-100', 'text-green-900', 'border-green-200');
      adToggleBtn.classList.add('bg-red-100', 'text-red-900', 'border-red-200');
    }
  }
  adToggleBtn.addEventListener('click', function() {
    adsEnabled = !adsEnabled;
    updateAdToggleBtn();
    renderChatHistory();
  });
  updateAdToggleBtn();

  function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.style.display = 'block';
    clearTimeout(showToast._timeout);
    showToast._timeout = setTimeout(() => { toast.style.display = 'none'; }, 1400);
  }
  function showSpinner() {
    const logo = document.getElementById('aiLogo');
    if (logo) logo.src = 'spinner.gif';
  }
  function showLogo() {
    const logo = document.getElementById('aiLogo');
    if (logo) logo.src = 'ai.gif';
  }

  function loadState() {
    const storedConversations = localStorage.getItem(STORAGE_KEYS.conversations);
    if (storedConversations) {
      try { conversations = JSON.parse(storedConversations); } catch {}
    }
    const storedActiveConv = localStorage.getItem(STORAGE_KEYS.activeConversationId);
    if (storedActiveConv && conversations[storedActiveConv]) {
      activeConversationId = storedActiveConv;
    }
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEYS.conversations, JSON.stringify(conversations));
    if (activeConversationId) localStorage.setItem(STORAGE_KEYS.activeConversationId, activeConversationId);
  }

  function generateId() {
    return 'conv_' + Math.random().toString(36).substring(2, 10);
  }

  function renderConversationList() {
    const convs = Object.values(conversations);
    conversationSelect.innerHTML = '';
    if (convs.length === 0) {
      const opt = document.createElement('option');
      opt.value = '';
      opt.textContent = '(No conversations)';
      opt.disabled = true;
      conversationSelect.appendChild(opt);
      activeConversationId = null;
      saveState();
      renderChatHistory();
      return;
    }
    convs.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
    convs.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      let firstUserMsg = (c.messages || []).find(m => m.role === 'user');
      let label = firstUserMsg && firstUserMsg.content
        ? firstUserMsg.content.substring(0, 25) + (firstUserMsg.content.length > 25 ? '...' : '')
        : '(No query)';
      opt.textContent = label;
      conversationSelect.appendChild(opt);
    });
    if (!convs.find(c => c.id === activeConversationId)) {
      activeConversationId = convs[0].id;
      saveState();
    }
    conversationSelect.value = activeConversationId;
    renderChatHistory();
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function renderAdBubble(ad, image) {
    const imageHtml = image?.src ? `
      <div class="related-photo-wrap">
        <img src="${image.src}" alt="${escapeHtml(image.alt || 'Related image')}" />
      </div>
    ` : "";
    const photographerHtml = image?.photographer
      ? `<div style="font-size:0.8rem;color:#047857;margin-top:4px;">Photo: ${escapeHtml(image.photographer)}</div>`
      : "";
    return `
      <div class="ad-bubble">
        <div style="display:flex;align-items:flex-start;gap:12px;">
          ${imageHtml}
          <div style="min-width:0;flex:1;">
            <div class="font-semibold mb-1">Sponsored</div>
            <img src="${ad.image}" alt="Ad" style="max-height:36px;margin-bottom:0.5rem;border-radius:0.25rem;" />
            <div class="font-semibold">${escapeHtml(ad.title)}</div>
            <div class="mt-1">${escapeHtml(ad.description)}</div>
            ${photographerHtml}
            <div class="mt-2">
              <a href="${ad.url}" target="_blank" rel="noopener noreferrer">Learn more</a>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderChatHistory() {
    chatHistory.innerHTML = '';
    if (!activeConversationId || !conversations[activeConversationId]) {
      chatHistory.innerHTML = '<p class="text-gray-500 italic">No conversation selected.</p>';
      return;
    }
    const msgs = conversations[activeConversationId].messages;
    msgs.forEach((msg, idx) => {
      if (msg.role === 'system') return;
      const div = document.createElement('div');
      div.className = msg.role === 'user' ? 'text-right mb-3' : 'text-left mb-3';
      const bubble = document.createElement('div');

      if (msg.role === 'search') {
        bubble.className = 'inline-block bg-blue-50 text-blue-900 px-2 py-2 rounded-lg max-w-[90%] mb-2';
        bubble.innerHTML = `
          <div style="font-size:0.95em; margin-bottom:4px;">
            <b>Realtime Search:</b> ${escapeHtml(msg.content)}
          </div>
          <iframe
            src="https://andisearch.com/?q=${encodeURIComponent(msg.content)}"
            style="width:100%; min-width:320px; max-width:700px; height:380px; border:1px solid #eee; border-radius:7px; background:#fff;"
            loading="lazy"
            referrerpolicy="no-referrer"
          ></iframe>
        `;
        div.appendChild(bubble);
        chatHistory.appendChild(div);
        return;
      }

      bubble.className = msg.role === 'user'
        ? 'inline-block bg-black text-white px-4 py-2 rounded-lg max-w-[80%] whitespace-pre-wrap'
        : 'inline-block bg-gray-200 text-gray-900 px-4 py-2 rounded-lg max-w-[80%] whitespace-pre-wrap';

      if (msg.role === 'assistant') {
        bubble.innerHTML = `
          <img src="ai.gif" alt="Bot" class="inline h-7 w-7 mr-2 align-middle" />
          <span class="align-middle">${escapeHtml(msg.content)}</span>
          <button class="copy-bubble-btn" data-idx="${idx}" title="Copy to clipboard"
            style="background:none;border:none;cursor:pointer;padding:0 0 0 8px;font-size:1.15em;vertical-align:middle;text-align:left;">
            ⧉
          </button>
        `;
        div.appendChild(bubble);
        chatHistory.appendChild(div);
      } else {
        bubble.textContent = msg.content;
        div.appendChild(bubble);
        chatHistory.appendChild(div);
      }
    });

    chatHistory.scrollTop = chatHistory.scrollHeight;
    document.querySelectorAll('.copy-bubble-btn').forEach(btn => {
      btn.onclick = function() {
        const idx = parseInt(this.getAttribute('data-idx'));
        const msg = conversations[activeConversationId].messages[idx];
        if (msg) {
          navigator.clipboard.writeText(msg.content);
          showToast("Copied!");
        }
      };
    });

    if (adsEnabled) scheduleAdRender();
  }

  function scheduleAdRender() {
    const thisToken = ++adRenderToken;
    const lastUser = activeConversationId && conversations[activeConversationId]
      ? [...conversations[activeConversationId].messages].reverse().find(m => m.role === 'user')
      : null;
    if (!lastUser) return;

    const adSlot = document.createElement('div');
    adSlot.innerHTML = '<div class="ad-bubble">Loading sponsored content...</div>';
    chatHistory.appendChild(adSlot);
    chatHistory.scrollTop = chatHistory.scrollHeight;

    Promise.allSettled([
      fetchRelevantImage(lastUser.content),
      fetchGumGumAd(lastUser.content)
    ]).then(results => {
      if (thisToken !== adRenderToken) return;
      const image = results[0].status === 'fulfilled' ? results[0].value : null;
      const ad = results[1].status === 'fulfilled' ? results[1].value : null;
      if (!ad) {
        adSlot.innerHTML = '';
        return;
      }
      adSlot.innerHTML = renderAdBubble(ad, image);
      chatHistory.scrollTop = chatHistory.scrollHeight;
    });
  }

  function createNewConversation() {
    const id = generateId();
    conversations[id] = {
      id,
      messages: [{ role: 'system', content: 'You are a helpful assistant. Be concise, clear, and friendly.' }],
      createdAt: new Date().toISOString()
    };
    activeConversationId = id;
    saveState();
    renderConversationList();
    renderChatHistory();
  }

  document.getElementById('copyInputBtn').addEventListener('click', function() {
    const input = document.getElementById('chatInput');
    navigator.clipboard.writeText(input.value);
    input.value = '';
    showToast("Copied!");
  });

  document.getElementById('googleSearchBtn').addEventListener('click', function() {
    const input = document.getElementById('googleSearchInput');
    const query = input.value.trim();
    if (query && activeConversationId) {
      conversations[activeConversationId].messages.push({ role: 'search', content: query });
      saveState();
      renderChatHistory();
      input.value = '';
    }
  });

 async function fetchLLM(messages) {
  const lastUser = [...messages].reverse().find(m => m.role === 'user');
  const payload = {
    model: MLVOCA_MODEL,
    prompt: lastUser ? lastUser.content : '',
    stream: false
  };

  showDebug('Request payload:\n' + JSON.stringify(payload, null, 2));

  const response = await fetch(MLVOCA_ENDPOINT, {
    method: 'POST',
    headers: {
      'Content-Type': 'text/plain'
    },
    body: JSON.stringify(payload)
  });

  const rawText = await response.text();
  let parsed = null;
  try {
    parsed = rawText ? JSON.parse(rawText) : null;
  } catch {}

  showDebug(`HTTP ${response.status} ${response.statusText}\n\nRaw response:\n${rawText}`);

  if (!response.ok) {
    const msg =
      parsed?.error ||
      parsed?.message ||
      rawText ||
      `HTTP ${response.status} ${response.statusText}`;
    throw new Error(`LLM request failed.\nStatus: ${response.status} ${response.statusText}\nMessage: ${msg}`);
  }

  return parsed?.response?.trim() || parsed?.message?.content?.trim() || parsed?.content?.trim() || rawText.trim() || '[No response]';
}
  newConversationBtn.addEventListener('click', createNewConversation);
  conversationSelect.addEventListener('change', () => {
    const selectedId = conversationSelect.value;
    if (conversations[selectedId]) {
      activeConversationId = selectedId;
      saveState();
      renderChatHistory();
    }
  });

  chatForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    const userMessage = chatInput.value.trim();
    if (!userMessage || !activeConversationId) return;

    clearError();
    clearDebug();

    const conversation = conversations[activeConversationId];
    conversation.messages.push({ role: 'user', content: userMessage });
    saveState();
    renderChatHistory();
    showSpinner();

    const llmMessages = [
      { role: 'system', content: 'You are a helpful assistant. Be concise and helpful.' },
      ...conversation.messages.filter(m => m.role === 'user' || m.role === 'assistant').slice(-12)
    ];

    let aiResponse;
    try {
      aiResponse = await fetchLLM(llmMessages);
    } catch (err) {
      showError(err.message);
      showDebug(err.stack || err.message || String(err));
      aiResponse = `Sorry, there was an error contacting the hosted model.\n\n${err.message}`;
    }

    conversation.messages.push({ role: 'assistant', content: aiResponse });
    saveState();
    renderChatHistory();
    showLogo();
    chatInput.value = '';
  });

  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      chatForm.requestSubmit();
    }
  });

  function init() {
    loadState();
    renderConversationList();
    if (!activeConversationId) createNewConversation();
  }
  init();
})();

let followupSuggestions = [
  "Can you explain this topic in more detail?",
  "What are the latest developments about this?",
  "What are some common misconceptions?"
];
const followupDropdown = document.getElementById('followupDropdown');
const followupList = document.getElementById('followupList');
const toggleFollowupDropdown = document.getElementById('toggleFollowupDropdown');
const chatInput = document.getElementById('chatInput');
const chatForm = document.getElementById('chatForm');

function renderFollowupSuggestions() {
  followupList.innerHTML = '';
  followupSuggestions.forEach((q, i) => {
    const li = document.createElement('li');
    li.innerHTML = `
      <button class="w-full text-left px-4 py-2 hover:bg-blue-50 transition followup-suggestion-btn"
              data-idx="${i}" style="white-space:normal;">
        ${q}
      </button>
    `;
    followupList.appendChild(li);
  });
}
toggleFollowupDropdown.addEventListener('click', function() {
  if (followupDropdown.style.display === 'none') {
    renderFollowupSuggestions();
    followupDropdown.style.display = 'block';
    toggleFollowupDropdown.textContent = "Follow-up Questions ▲";
  } else {
    followupDropdown.style.display = 'none';
    toggleFollowupDropdown.textContent = "Follow-up Questions ▼";
  }
});
followupList.addEventListener('click', function(e) {
  if (e.target.classList.contains('followup-suggestion-btn')) {
    const idx = e.target.getAttribute('data-idx');
    const question = followupSuggestions[idx];
    if (question) {
      chatInput.value = question;
      followupDropdown.style.display = 'none';
      toggleFollowupDropdown.textContent = "Follow-up Questions ▼";
      chatForm.requestSubmit();
    }
  }
});
</script>

<div id="toast" style="
display:none;
position: fixed;
bottom: 30px;
left: 50%;
transform: translateX(-50%);
background: #222;
color: #fff;
padding: 12px 24px;
border-radius: 6px;
